<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактив: Письменный экзамен (Видеоаналитика)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background-color: #faf9f6;
            color: #00003a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 58, 0.1);
            padding: 40px;
            text-align: center;
        }

        .exam-card {
            background-color: #faf9f6;
            border: 2px solid #e0e0e0;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            text-align: left;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .exam-card p {
            font-size: 1.3rem;
            line-height: 1.5;
            color: #00003a;
            margin-bottom: 20px;
        }

        .exam-card p:last-child {
            margin-bottom: 0;
        }

        .btn {
            font-family: 'Times New Roman', serif;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 16px 48px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 58, 0.15);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 58, 0.25);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(0, 0, 58, 0.15);
        }

        .btn-primary {
            background-color: #2f89dd;
            color: white;
        }

        .btn-secondary {
            background-color: #00003a;
            color: white;
            font-size: 1.3rem;
            padding: 12px 40px;
            margin-top: 20px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .answer-window {
            margin-top: 30px;
            padding: 30px;
            background-color: #faf9f6;
            border-radius: 48px;
            border: 2px dashed #2f89dd;
            display: none;
        }

        .answer-window label {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #00003a;
            margin-bottom: 20px;
        }

        textarea {
            font-family: 'Times New Roman', serif;
            width: 100%;
            min-height: 200px;
            padding: 20px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 32px;
            resize: vertical;
            background-color: white;
            color: #00003a;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #2f89dd;
            box-shadow: 0 0 0 3px rgba(47, 137, 221, 0.3);
        }

        textarea:disabled {
            background-color: #f0f0f0;
            cursor: not-allowed;
        }

        .result-block {
            margin-top: 30px;
            padding: 25px;
            border-radius: 32px;
            background-color: #faf9f6;
            border-left: 8px solid #ff0027;
            text-align: left;
        }

        .grade {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff0027;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .comment {
            font-size: 1.3rem;
            line-height: 1.4;
            color: #00003a;
        }

        .error-message {
            color: #ff0027;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .warning-message {
            color: #ff0027;
            font-size: 1rem;
            margin-top: 5px;
        }

        .timer-block {
            margin-top: 30px;
            padding: 20px;
            background-color: #00003a;
            color: #faf9f6;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            display: none;
        }

        .timer-text {
            color: #ff0027;
            font-size: 3rem;
            margin-left: 10px;
        }

        hr {
            border: 1px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="exam-card">
            <p>📝 Вы работаете на железнодорожном вокзале. У вас установлены обычные камеры, а нужна видеоаналитика. Обоснуйте для руководителя необходимость улучшить систему видеонаблюдения.</p>
            <p style="font-size: 1rem; color: #666; margin-top: 10px;">(Ответ должен быть не меньше 300 символов и не больше 2000)</p>
        </div>

        <button class="btn btn-primary" id="startAnswerBtn">Ответить на задание</button>

        <div id="answerWindow" class="answer-window">
            <label for="answerInput">📋 Введите текст</label>
            <textarea id="answerInput" placeholder="Введите ваш ответ на русском языке..."></textarea>
            <div style="display: flex; justify-content: center;">
                <button class="btn btn-secondary" id="checkTextBtn">Проверить текст</button>
            </div>
            <div id="inputWarning" class="warning-message"></div>
        </div>

        <!-- Блок таймера -->
        <div id="timerBlock" class="timer-block">
            ⏳ Проверка ответа: <span id="timerSeconds" class="timer-text">120</span> сек.
        </div>

        <!-- Блок для отображения результата проверки -->
        <div id="resultContainer"></div>
    </div>

    <script>
        (function() {
            // --- Обязательные слова/фразы (10 штук) ---
            const REQUIRED_PHRASES = [
                "антитеррористическая защищенность",
                "детекция",
                "трекинг",
                "прогнозирование",
                "система видеонаблюдения",
                "видеоаналитика",
                "опасные пассажиры",
                "подозрительные предметы",
                "забытые вещи",
                "записи с камер"
            ];

            // --- DOM элементы ---
            const startBtn = document.getElementById('startAnswerBtn');
            const answerWindow = document.getElementById('answerWindow');
            const checkBtn = document.getElementById('checkTextBtn');
            const answerInput = document.getElementById('answerInput');
            const resultContainer = document.getElementById('resultContainer');
            const inputWarning = document.getElementById('inputWarning');
            const timerBlock = document.getElementById('timerBlock');
            const timerSeconds = document.getElementById('timerSeconds');

            // --- Состояние джетлага (5 минут) ---
            let lastAttemptTime = 0;
            const COOLDOWN_MS = 5 * 60 * 1000;
            
            // --- Переменные для таймера ---
            let timerInterval = null;
            let currentResult = null; // Сохраняем результат до показа

            /**
             * Функция для поиска слов с учетом морфологии русского языка
             */
            function findWordInText(word, text) {
                const lowerText = text.toLowerCase();
                const lowerWord = word.toLowerCase();
                
                // Для фразы "антитеррористическая защищенность"
                if (lowerWord === "антитеррористическая защищенность") {
                    const hasAnti = lowerText.includes("антитеррор");
                    const hasZashish = lowerText.includes("защищ");
                    return (hasAnti && hasZashish);
                }
                
                // Для "система видеонаблюдения"
                if (lowerWord === "система видеонаблюдения") {
                    const hasSystem = lowerText.includes("систем") || lowerText.includes("систему") || lowerText.includes("системой");
                    const hasVideo = lowerText.includes("видеонаблюден") || lowerText.includes("видеонаблюдение") || lowerText.includes("видеонаблюдения");
                    return (hasSystem && hasVideo);
                }
                
                // Для "опасные пассажиры"
                if (lowerWord === "опасные пассажиры") {
                    const hasDanger = lowerText.includes("опасн") || lowerText.includes("опасных") || lowerText.includes("опасные");
                    const hasPass = lowerText.includes("пассажир") || lowerText.includes("пассажиров") || lowerText.includes("пассажирами");
                    return (hasDanger && hasPass);
                }
                
                // Для "подозрительные предметы"
                if (lowerWord === "подозрительные предметы") {
                    const hasSusp = lowerText.includes("подозрительн") || lowerText.includes("подозрительных") || lowerText.includes("подозрительные");
                    const hasObj = lowerText.includes("предмет") || lowerText.includes("предметы") || lowerText.includes("предметов");
                    return (hasSusp && hasObj);
                }
                
                // Для "забытые вещи"
                if (lowerWord === "забытые вещи") {
                    const hasForgot = lowerText.includes("забыт") || lowerText.includes("забытые") || lowerText.includes("забытых");
                    const hasThings = lowerText.includes("вещ") || lowerText.includes("вещи") || lowerText.includes("вещей");
                    return (hasForgot && hasThings);
                }
                
                // Для "записи с камер"
                if (lowerWord === "записи с камер") {
                    const hasRecords = lowerText.includes("запис") || lowerText.includes("записи") || lowerText.includes("записей");
                    const hasCam = lowerText.includes("камер") || lowerText.includes("камерами") || lowerText.includes("камерах");
                    return (hasRecords && hasCam);
                }
                
                // Для "детекция"
                if (lowerWord === "детекция") {
                    return lowerText.includes("детекц") || lowerText.includes("детекции") || lowerText.includes("детекцией") || 
                           lowerText.includes("детекцию") || lowerText.includes("детекций");
                }
                
                // Для "трекинг"
                if (lowerWord === "трекинг") {
                    return lowerText.includes("трекинг") || lowerText.includes("трекинга") || lowerText.includes("трекингом") || 
                           lowerText.includes("трекинге");
                }
                
                // Для "прогнозирование"
                if (lowerWord === "прогнозирование") {
                    return lowerText.includes("прогнозирован") || lowerText.includes("прогнозирования") || 
                           lowerText.includes("прогнозированию") || lowerText.includes("прогнозированием");
                }
                
                // Для "видеоаналитика"
                if (lowerWord === "видеоаналитика") {
                    return lowerText.includes("видеоаналитик") || lowerText.includes("видеоаналитики") || 
                           lowerText.includes("видеоаналитике") || lowerText.includes("видеоаналитику");
                }
                
                return lowerText.includes(lowerWord);
            }

            // --- Функция проверки текста ---
            function evaluateText(text) {
                // 1. Проверка длины
                const trimmedText = text.trim();
                if (trimmedText.length < 300 || trimmedText.length > 2000) {
                    return {
                        success: false,
                        reason: 'length',
                        message: `Экзамен не сдан. Длина текста должна быть от 300 до 2000 символов. Сейчас: ${trimmedText.length} символов.`
                    };
                }

                // 2. Подготовка текста: приводим к нижнему регистру для поиска
                const lowerText = text.toLowerCase();
                
                // 3. Подсчет совпадений с обязательными фразами
                let foundCount = 0;
                const foundPhrases = [];

                REQUIRED_PHRASES.forEach(phrase => {
                    if (findWordInText(phrase, lowerText)) {
                        foundCount++;
                        foundPhrases.push(phrase);
                    }
                });

                // 4. Определение оценки
                let grade = null;
                let comment = '';

                if (foundCount >= 9) {
                    grade = '5 (Отлично)';
                    comment = 'Вы полностью освоили материал курса. Так держать! Теперь организуете эффективную систему видеонаблюдения и сможете обойти любые возражения руководства.';
                } else if (foundCount >= 7) {
                    grade = '4 (Хорошо)';
                    comment = 'Вы хорошо ориентируетесь в теме и сможете убедить руководителя в необходимости установить систему видеонаблюдения. Но не обойдется без возражений. Потренируйтесь описывать пользу для организации, найдите статистику по теме, чтобы руководитель точно выделил бюджет.';
                } else if (foundCount >= 5) {
                    grade = '3 (Удовлетворительно)';
                    comment = 'Вы неплохо усвоили материал курса, но можно и лучше. Вернитесь к лекциям, посмотрите видео еще раз и выполните задание снова.';
                } else {
                    return {
                        success: false,
                        reason: 'words',
                        message: `Экзамен не сдан. В тексте недостаточно профессиональных терминов. Использовано ключевых понятий: ${foundCount} из 5 необходимых.`
                    };
                }

                return {
                    success: true,
                    grade: grade,
                    comment: comment,
                    foundCount: foundCount,
                    foundPhrases: foundPhrases
                };
            }

            // --- Функция для запуска таймера на 120 секунд ---
            function startTimer(seconds, callback) {
                let timeLeft = seconds;
                timerSeconds.textContent = timeLeft;
                timerBlock.style.display = 'block';
                
                // Блокируем кнопки и поле ввода на время проверки
                checkBtn.disabled = true;
                answerInput.disabled = true;
                startBtn.disabled = true;
                
                timerInterval = setInterval(() => {
                    timeLeft -= 1;
                    timerSeconds.textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        timerBlock.style.display = 'none';
                        
                        // Разблокируем кнопки
                        checkBtn.disabled = false;
                        answerInput.disabled = false;
                        startBtn.disabled = false;
                        
                        // Вызываем колбэк для показа результата
                        if (callback) callback();
                    }
                }, 1000);
            }

            // --- Отображение результата ---
            function displayResult(result) {
                if (result.success) {
                    resultContainer.innerHTML = `
                        <div class="result-block">
                            <div class="grade">
                                <span>Оценка: ${result.grade}</span>
                                <span style="font-size: 1rem; color: #00003a;">(использовано терминов: ${result.foundCount}/10)</span>
                            </div>
                            <div class="comment">${result.comment}</div>
                        </div>
                    `;
                } else {
                    resultContainer.innerHTML = `
                        <div class="result-block" style="border-left-color: #ff0027;">
                            <div class="grade" style="font-size: 1.8rem;">❌ Экзамен не сдан</div>
                            <div class="comment">${result.message}</div>
                        </div>
                    `;
                }
            }

            // --- Обработчик "Ответить на задание" ---
            startBtn.addEventListener('click', function() {
                const now = Date.now();
                
                if (now - lastAttemptTime < COOLDOWN_MS) {
                    const remainingMs = COOLDOWN_MS - (now - lastAttemptTime);
                    const remainingMinutes = Math.ceil(remainingMs / 60000);
                    inputWarning.textContent = `Джетлаг: подождите ещё ${remainingMinutes} мин. перед новой попыткой.`;
                    return;
                }

                // Если есть активный таймер, не даем начать новую попытку
                if (timerInterval) {
                    inputWarning.textContent = 'Идёт проверка предыдущего ответа. Подождите.';
                    return;
                }

                inputWarning.textContent = '';
                answerInput.value = '';
                resultContainer.innerHTML = '';
                answerWindow.style.display = 'block';
                answerWindow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Разблокируем поле ввода и кнопку проверки (на случай если были заблокированы)
                checkBtn.disabled = false;
                answerInput.disabled = false;
            });

            // --- Обработчик "Проверить текст" ---
            checkBtn.addEventListener('click', function() {
                const text = answerInput.value;
                const now = Date.now();

                // Проверка джетлага
                if (now - lastAttemptTime < COOLDOWN_MS) {
                    const remainingMs = COOLDOWN_MS - (now - lastAttemptTime);
                    const remainingMinutes = Math.ceil(remainingMs / 60000);
                    inputWarning.textContent = `Джетлаг: подождите ещё ${remainingMinutes} мин.`;
                    return;
                }

                // Проверка на пустой текст
                if (!text.trim()) {
                    inputWarning.textContent = 'Пожалуйста, введите текст.';
                    return;
                }

                // Проверка, не идет ли уже таймер
                if (timerInterval) {
                    inputWarning.textContent = 'Проверка уже выполняется. Подождите.';
                    return;
                }

                // Очищаем предыдущие результаты и предупреждения
                inputWarning.textContent = '';
                resultContainer.innerHTML = '';

                // Вычисляем результат (сохраняем его, но не показываем)
                const result = evaluateText(text);
                currentResult = result;
                
                // Устанавливаем время последней попытки (джетлаг)
                lastAttemptTime = Date.now();

                // Запускаем таймер на 120 секунд
                startTimer(120, () => {
                    // По окончании таймера показываем результат
                    displayResult(currentResult);
                    
                    // Добавляем сообщение о джетлаге для следующей попытки
                    if (currentResult.success) {
                        const msg = document.createElement('div');
                        msg.className = 'warning-message';
                        msg.textContent = 'Следующая попытка будет доступна через 5 минут.';
                        resultContainer.appendChild(msg);
                    }
                    
                    currentResult = null; // Очищаем сохраненный результат
                });
            });

            // Очистка таймера при уходе со страницы (на всякий случай)
            window.addEventListener('beforeunload', function() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
            });
        })();
    </script>
</body>
</html>
